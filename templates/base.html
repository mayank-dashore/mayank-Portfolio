<!DOCTYPE html>
<html lang="en" data-mode="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mayank | Data Engineer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="theme-cyber-blue">
    <div class="page-shell">
        <div class="page-backdrop"></div>
        <div class="page-vignette"></div>
        <svg class="scroll-drawing-svg" viewBox="0 0 100 1000" preserveAspectRatio="none">
            <path id="scrollPath" class="scroll-drawing-path" d="M 50 0 C 20 200, 80 400, 30 600 C -20 800, 120 900, 50 1000" fill="none" stroke="var(--accent)" stroke-width="0.25" opacity="0.2" />
        </svg>
    </div>

    <!-- Fixed Sidebar Navigation -->
    <nav class="site-nav navbar navbar-expand-lg">
        <div class="nav-brand-container">
            <a class="nav-brand" href="/">
                <span class="brand-mark"></span>
            </a>
        </div>
        <div class="navbar-collapse show">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/">HOME</a></li>
                <li class="nav-item"><a class="nav-link" href="/about">ABOUT</a></li>
                <li class="nav-item"><a class="nav-link" href="/projects">PROJECTS</a></li>
                <li class="nav-item"><a class="nav-link" href="/blogs">BLOGS</a></li>
                <li class="nav-item"><a class="nav-link" href="/#contact">CONTACT</a></li>
                <li class="nav-divider"></li>
                <li class="nav-item">
                    <a class="nav-link theme-toggle" href="#" id="themeToggleBtn" aria-label="Toggle Light/Dark Mode">
                        <i class="fas fa-sun" id="theme-toggle-icon"></i>
                    </a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link theme-trigger" href="#" id="themeDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fas fa-palette"></i>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="themeDropdown">
                        <li><a class="dropdown-item theme-option" href="#" data-theme="theme-cyber-blue">Neon Blue (Default)</a></li>
                        <li><a class="dropdown-item theme-option" href="#" data-theme="theme-cyber-lime">Neon Lime</a></li>
                        <li><a class="dropdown-item theme-option" href="#" data-theme="theme-cyber-pink">Cyber Pink</a></li>
                        <li><a class="dropdown-item theme-option" href="#" data-theme="theme-cyber-green">Neon Green</a></li>
                        <li><a class="dropdown-item theme-option" href="#" data-theme="theme-cyber-yellow">Cyber Yellow</a></li>
                        <li><a class="dropdown-item theme-option" href="#" data-theme="theme-dynamic">Photo Theme (Auto)</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer text-center text-muted py-4">
        <div class="social-links mb-2">
            <a href="https://{{ data.contact.linkedin }}" target="_blank" class="social-link">
                <i class="fab fa-linkedin"></i>
            </a>
        </div>
        <span>Designed as a premium data engineering showcase</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
