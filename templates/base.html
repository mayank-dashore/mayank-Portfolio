<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mayank | Data Engineer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="theme-cyber-lime">
    <div class="page-shell">
        <div class="page-backdrop"></div>
        <div class="page-vignette"></div>
    </div>

    <nav class="site-nav navbar navbar-expand-lg">
        <div class="container-xl">
            <a class="nav-brand" href="#home">
                <span class="brand-mark"></span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#siteNav" aria-controls="siteNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="siteNav">
                <ul class="navbar-nav align-items-center gap-3">
                    <li class="nav-item active"><a class="nav-link" href="#home">HOME</a></li>
                    <li class="nav-item"><a class="nav-link" href="#about">ABOUT</a></li>
                    <li class="nav-item"><a class="nav-link" href="#projects">PROJECTS</a></li>
                    <li class="nav-item"><a class="nav-link" href="#blogs">BLOGS</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact">CONTACT</a></li>
                    <li class="nav-divider"></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link theme-trigger" href="#" id="themeDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fas fa-palette"></i>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="themeDropdown">
                            <li><a class="dropdown-item theme-option" href="#" data-theme="cyber-lime">Neon Lime (Default)</a></li>
                            <li><a class="dropdown-item theme-option" href="#" data-theme="cyber-blue">Cyber Blue</a></li>
                            <li><a class="dropdown-item theme-option" href="#" data-theme="cyber-pink">Cyber Pink</a></li>
                            <li><a class="dropdown-item theme-option" href="#" data-theme="cyber-green">Neon Green</a></li>
                            <li><a class="dropdown-item theme-option" href="#" data-theme="cyber-yellow">Cyber Yellow</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer text-center text-muted py-4">
        <div class="social-links mb-2">
            <a href="https://{{ data.contact.linkedin }}" target="_blank" class="social-link">
                <i class="fab fa-linkedin"></i>
            </a>
        </div>
        <span>Designed as a premium data engineering showcase</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
